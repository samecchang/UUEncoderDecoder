<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUEncode / UUDecode Tool</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f172a;
      --panel: #111827;
      --accent: #22d3ee;
      --muted: #9ca3af;
      --border: #1f2937;
      --text: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.12), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(94, 234, 212, 0.1), transparent 30%),
        linear-gradient(135deg, #0b1224, #0f172a 45%, #0b1224);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      padding: 28px;
      backdrop-filter: blur(6px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .radio-group {
      display: inline-flex;
      gap: 10px;
      background: #0c1221;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 999px;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: #0c1221;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    button {
      border: none;
      background: linear-gradient(120deg, #22d3ee, #38bdf8);
      color: #0b1224;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 12px 30px rgba(34, 211, 238, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(34, 211, 238, 0.35);
    }

    .footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 0;
    }
  </style>
</head>
<body>
  <main class="card">
    <header>
      <div>
        <h1>UUEncoder / UUDecoder</h1>
        <p class="small">Paste text, pick an action, and run entirely in your browser.</p>
      </div>
      <div class="radio-group" role="radiogroup" aria-label="Mode">
        <label>
          <input type="radio" name="mode" value="encode" checked />
          Encode
        </label>
        <label>
          <input type="radio" name="mode" value="decode" />
          Decode
        </label>
      </div>
    </header>

    <div class="grid">
      <div>
        <p class="small">Input</p>
        <textarea id="inputText" placeholder="Enter plain text to encode, or UUEncoded text to decode"></textarea>
      </div>
      <div>
        <p class="small">Result</p>
        <textarea id="outputText" placeholder="Result will appear here" readonly></textarea>
      </div>
    </div>

    <div class="footer">
      <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap;">
        <button id="runBtn">Run</button>
        <button id="swapBtn" title="Swap input and output">Swap</button>
        <button id="copyBtn" title="Copy result">Copy Result</button>
      </div>
      <span>All processing happens locally. No uploads.</span>
    </div>
  </main>

  <script>
    function toUUValue(char) {
      if (char === "`") return 0;
      return (char.charCodeAt(0) - 32) & 63;
    }

    function fromUUValue(val) {
      return val === 0 ? "`" : String.fromCharCode((val & 63) + 32);
    }

    function encodeChunk(bytes) {
      const out = [];
      for (let i = 0; i < bytes.length; i += 3) {
        const b1 = bytes[i];
        const b2 = bytes[i + 1] || 0;
        const b3 = bytes[i + 2] || 0;

        const c1 = (b1 >> 2) & 63;
        const c2 = ((b1 << 4) | (b2 >> 4)) & 63;
        const c3 = ((b2 << 2) | (b3 >> 6)) & 63;
        const c4 = b3 & 63;

        out.push(fromUUValue(c1), fromUUValue(c2), fromUUValue(c3), fromUUValue(c4));
      }
      return out.join("");
    }

    function uuEncode(text) {
      const bytes = new TextEncoder().encode(text);
      if (bytes.length === 0) return "`\nend";

      const lines = [];
      for (let i = 0; i < bytes.length; i += 45) {
        const chunk = bytes.slice(i, i + 45);
        const lenChar = fromUUValue(chunk.length);
        lines.push(lenChar + encodeChunk(chunk));
      }
      lines.push("`");
      lines.push("end");
      return lines.join("\n");
    }

    function uuDecode(text) {
      const lines = text.split(/\r?\n/);
      const output = [];

      for (const rawLine of lines) {
        const line = rawLine;
        if (line === "end" || line === "") continue;
        const expectedLen = toUUValue(line[0] || "`");
        if (expectedLen === 0) continue;

        const encoded = line.slice(1);
        const bytes = [];
        for (let i = 0; i < encoded.length; i += 4) {
          const v1 = toUUValue(encoded[i]);
          const v2 = toUUValue(encoded[i + 1] || "`");
          const v3 = toUUValue(encoded[i + 2] || "`");
          const v4 = toUUValue(encoded[i + 3] || "`");

          const b1 = (v1 << 2) | (v2 >> 4);
          const b2 = ((v2 & 15) << 4) | (v3 >> 2);
          const b3 = ((v3 & 3) << 6) | v4;

          bytes.push(b1);
          if (bytes.length < expectedLen) bytes.push(b2);
          if (bytes.length < expectedLen) bytes.push(b3);
        }

        output.push(...bytes.slice(0, expectedLen));
      }

      return new TextDecoder().decode(new Uint8Array(output));
    }

    function run() {
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const input = document.getElementById("inputText").value;
      const outEl = document.getElementById("outputText");
      try {
        const result = mode === "encode" ? uuEncode(input) : uuDecode(input);
        outEl.value = result;
      } catch (err) {
        outEl.value = `Error: ${err.message}`;
      }
    }

    document.getElementById("runBtn").addEventListener("click", run);
    document.getElementById("swapBtn").addEventListener("click", () => {
      const input = document.getElementById("inputText");
      const output = document.getElementById("outputText");
      [input.value, output.value] = [output.value, input.value];
    });
    document.getElementById("copyBtn").addEventListener("click", async () => {
      const val = document.getElementById("outputText").value;
      if (!val) return;
      try {
        await navigator.clipboard.writeText(val);
        document.getElementById("copyBtn").textContent = "Copied!";
        setTimeout(() => (document.getElementById("copyBtn").textContent = "Copy Result"), 1200);
      } catch (err) {
        alert("Copy failed: " + err.message);
      }
    });

    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        run();
      }
    });
  </script>
</body>
</html>
